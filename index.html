<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Morning Dashboard</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --border: #27272a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        h1 { margin: 0; font-size: 2rem; }
        .date { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }
        
        /* Weather Widget Styles */
        .weather-widget {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
        }
        .weather-current { border-right: 1px solid var(--border); padding-right: 1.5rem; }
        .weather-current .temp { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        .weather-forecast { display: flex; gap: 1rem; align-items: center; }
        .forecast-day { text-align: center; }
        .forecast-day .f-temp { font-weight: bold; }

        /* 3-Column Responsive Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }
        
        .section-title { font-size: 1.2rem; color: var(--accent); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .news-container { display: flex; flex-direction: column; gap: 1rem; }
        .news-card {
            background-color: var(--card-bg);
            padding: 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: transform 0.2s, border-color 0.2s;
        }
        .news-card:hover { transform: translateY(-2px); border-color: var(--accent); }
        .news-title { font-size: 1rem; font-weight: 600; margin: 0 0 0.5rem 0; line-height: 1.4; }
        .news-title a { color: var(--text-color); text-decoration: none; }
        .news-title a:hover { color: var(--accent); }
        .news-summary { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin: 0; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>Morning Dashboard</h1>
                <div class="date" id="current-date"></div>
            </div>
            <div class="weather-widget" id="weather-widget">
                <p>Loading weather for Copenhagen...</p>
            </div>
        </header>

        <main class="dashboard-grid">
            <div>
                <h2 class="section-title">World News</h2>
                <div id="world-news" class="news-container"><p>Loading...</p></div>
                <br>
                <h2 class="section-title">Tech & Innovation</h2>
                <div id="tech-news" class="news-container"><p>Loading...</p></div>
            </div>

            <div>
                <h2 class="section-title">Denmark Focus</h2>
                <div id="denmark-news" class="news-container"><p>Loading...</p></div>
                <br>
                <h2 class="section-title">Greece Focus</h2>
                <div id="greece-news" class="news-container"><p>Loading...</p></div>
            </div>

            <div>
                <h2 class="section-title">Sports Arena</h2>
                <div id="sports-news" class="news-container"><p>Loading...</p></div>
            </div>
        </main>
    </div>

    <script>
        // Set current date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', options);

        // Fetch Live Copenhagen Weather (Open-Meteo API - No Key Required)
        // Coordinates for Copenhagen: Lat 55.6761, Lon 12.5683
        const weatherUrl = "https://api.open-meteo.com/v1/forecast?latitude=55.6761&longitude=12.5683&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=Europe%2FCopenhagen";
        
        fetch(weatherUrl)
            .then(res => res.json())
            .then(wData => {
                const current = wData.current_weather;
                const daily = wData.daily;
                
                // Construct Weather UI
                let html = `
                    <div class="weather-current">
                        <div><b>Copenhagen</b></div>
                        <div class="temp">${Math.round(current.temperature)}°C</div>
                        <div style="color: var(--text-muted)">Wind: ${current.windspeed} km/h</div>
                    </div>
                    <div class="weather-forecast">
                `;
                
                // Build 3-day forecast loop
                for(let i = 1; i <= 3; i++) {
                    const fDate = new Date(daily.time[i]).toLocaleDateString('en-US', { weekday: 'short' });
                    html += `
                        <div class="forecast-day">
                            <div style="color: var(--text-muted)">${fDate}</div>
                            <div class="f-temp">${Math.round(daily.temperature_2m_max[i])}°</div>
                            <div style="color: #6b7280; font-size:0.8rem">${Math.round(daily.temperature_2m_min[i])}°</div>
                        </div>
                    `;
                }
                html += `</div>`;
                document.getElementById('weather-widget').innerHTML = html;
            })
            .catch(() => {
                document.getElementById('weather-widget').innerHTML = "<p>Weather unavailable</p>";
            });

        // Fetch curated news.json
        fetch('news.json')
            .then(response => {
                if (!response.ok) throw new Error('No news data found');
                return response.json();
            })
            .then(data => {
                const renderColumn = (containerId, articles) => {
                    const container = document.getElementById(containerId);
                    container.innerHTML = '';
                    if(!articles || articles.length === 0) {
                        container.innerHTML = '<p>No critical updates.</p>';
                        return;
                    }
                    articles.forEach(article => {
                        const card = document.createElement('div');
                        card.className = 'news-card';
                        card.innerHTML = `
                            <h3 class="news-title"><a href="${article.link}" target="_blank">${article.title}</a></h3>
                            <p class="news-summary">${article.summary}</p>
                        `;
                        container.appendChild(card);
                    });
                };

                // Populate UI categories
                renderColumn('world-news', data.world);
                renderColumn('tech-news', data.tech);
                renderColumn('denmark-news', data.denmark);
                renderColumn('greece-news', data.greece);
                renderColumn('sports-news', data.sports);
            })
            .catch(error => {
                console.error(error);
            });
    </script>
</body>
</html>
