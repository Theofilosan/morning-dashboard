<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Morning Dashboard</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #27272a;
            padding-bottom: 1rem;
        }
        h1 { margin: 0; font-size: 2rem; }
        .date { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }
        
        /* Responsive two-column grid layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr 1fr; }
        }
        
        .section-title { font-size: 1.2rem; color: var(--accent); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #27272a; padding-bottom: 0.5rem; }
        .news-container { display: flex; flex-direction: column; gap: 1rem; }
        .news-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #27272a;
            transition: transform 0.2s;
        }
        .news-card:hover { transform: translateY(-2px); border-color: var(--accent); }
        .news-title { font-size: 1.1rem; font-weight: 600; margin: 0 0 0.5rem 0; }
        .news-title a { color: var(--text-color); text-decoration: none; }
        .news-title a:hover { color: var(--accent); }
        .news-summary { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; margin: 0; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Morning Dashboard</h1>
            <div class="date" id="current-date"></div>
        </header>

        <main class="dashboard-grid">
            <div>
                <h2 class="section-title">Denmark Updates</h2>
                <div id="denmark-news" class="news-container">
                    <p>Loading Denmark news...</p>
                </div>
            </div>

            <div>
                <h2 class="section-title">Greece Updates</h2>
                <div id="greece-news" class="news-container">
                    <p>Loading Greece news...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Display current date in a human-readable format
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', options);

        // Fetch the news.json generated by the scraper
        fetch('news.json')
            .then(response => {
                if (!response.ok) throw new Error('No news data found');
                return response.json();
            })
            .then(data => {
                // Function to render articles in a specific container
                const renderColumn = (containerId, articles) => {
                    const container = document.getElementById(containerId);
                    container.innerHTML = '';
                    if(!articles || articles.length === 0) {
                        container.innerHTML = '<p>No news available.</p>';
                        return;
                    }
                    articles.forEach(article => {
                        const card = document.createElement('div');
                        card.className = 'news-card';
                        card.innerHTML = `
                            <h3 class="news-title"><a href="${article.link}" target="_blank">${article.title}</a></h3>
                            <p class="news-summary">${article.summary}</p>
                        `;
                        container.appendChild(card);
                    });
                };

                // Populate the columns with data
                renderColumn('denmark-news', data.denmark);
                renderColumn('greece-news', data.greece);
            })
            .catch(error => {
                const errorMsg = `<p style="color: #ef4444;">Failed to load news.</p>`;
                document.getElementById('denmark-news').innerHTML = errorMsg;
                document.getElementById('greece-news').innerHTML = errorMsg;
                console.error(error);
            });
    </script>
</body>
</html>
